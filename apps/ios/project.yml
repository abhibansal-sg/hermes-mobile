name: HermesMobile
options:
  bundleIdPrefix: ai.hermes
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    DEVELOPMENT_TEAM: 6J4Y9NKRQ2
    CODE_SIGN_STYLE: Automatic
    CURRENT_PROJECT_VERSION: 127
    MARKETING_VERSION: 1.0.1
packages:
  # Offline-first cache plus the protected app-group WorkRepository. The share
  # extension links GRDB so it can atomically enqueue into the same database.
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "7.0.0"
  # LaTeX math rendering for transcript math segments (STR-445).
  # HermesMobile only; neither extension renders transcript content.
  SwiftMath:
    url: https://github.com/mgriebling/SwiftMath
    from: "1.7.3"
targets:
  HermesWorkTestHost:
    type: application
    platform: iOS
    sources:
      - HermesWorkTestHost
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.hermes.app.work-test-host
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: true
  HermesMobile:
    type: application
    platform: iOS
    sources:
      - HermesMobile
    dependencies:
      - target: HermesWidgets
        embed: true
      - target: HermesShare
        embed: true
      # DEBUG-only debug bridge. Linked in all configs by XcodeGen, but its
      # modules compile to nothing in Release (source-level #if DEBUG), so no
      # Offline-first SQLite cache (CONTRACT-OFFLINE-CACHE.md P1/P2).
      # HermesMobile only; no extension target links this.
      - package: GRDB
        product: GRDB
      # LaTeX math rendering (MathSegmentView / STR-445).
      - package: SwiftMath
        product: SwiftMath
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.hermes.app
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: Entitlements/HermesMobile.entitlements
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
    info:
      path: HermesMobile/Info.plist
      properties:
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleDisplayName: Hermes Agent
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSAppTransportSecurity:
          # Existing: relaxes ATS for local-network / IP-literal gateway dials
          # (RFC1918, .local, link-local). Also covers a Tailscale IP-literal
          # relay URL like ws://100.x.y.z:8790 — ATS is not enforced on IP
          # literals, so the numeric tailnet address needs no exception.
          NSAllowsLocalNetworking: true
          # Wave-2 relay (dev/QA): the relay's downstream is plain ws:// over
          # Tailscale (Tailscale already encrypts the tunnel). ATS blocks non-TLS
          # loads to a PUBLIC FQDN, and the tailnet MagicDNS name below is a public
          # `.ts.net` host, so a NARROW per-host exception is required to let the
          # phone dial it by name. Scoped to this one owner tailnet host only —
          # NSAllowsArbitraryLoads stays OFF. Prefer the IP-literal relay URL in
          # production; this entry only enables the MagicDNS-name convenience.
          NSExceptionDomains:
            abbhinnavs-mac-studio.tailec61ab.ts.net:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSIncludesSubdomains: false
        NSLocalNetworkUsageDescription: Hermes Agent connects to your own gateway server on your local network or tailnet.
        NSCameraUsageDescription: Capture a photo to send to Hermes Agent.
        NSPhotoLibraryUsageDescription: Attach photos from your library to Hermes Agent conversations.
        NSMicrophoneUsageDescription: Dictate messages to Hermes Agent with your voice.
        NSFaceIDUsageDescription: Unlock Hermes Agent with Face ID.
        LSApplicationQueriesSchemes:
          - tailscale
        NSUserActivityTypes:
          - ai.hermes.app.openSession
        NSSupportsLiveActivities: true
        BGTaskSchedulerPermittedIdentifiers:
          - ai.hermes.app.refresh
        UIBackgroundModes:
          - fetch
          - remote-notification
        CFBundleURLTypes:
          - CFBundleURLName: ai.hermes.app
            CFBundleURLSchemes:
              - hermesapp
        ITSAppUsesNonExemptEncryption: false
  HermesWidgets:
    type: app-extension
    platform: iOS
    sources:
      - HermesWidgets
      - HermesMobile/Support/SharedStore.swift
      - HermesMobile/Support/HermesTurnAttributes.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.hermes.app.HermesWidgets
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_ENTITLEMENTS: Entitlements/HermesExtension.entitlements
    info:
      path: HermesWidgets/Info.plist
      properties:
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleDisplayName: Hermes Agent
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
  HermesShare:
    type: app-extension
    platform: iOS
    sources:
      - HermesShare
      - HermesMobile/Support/SharedStore.swift
      - HermesMobile/Work
    dependencies:
      - package: GRDB
        product: GRDB
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.hermes.app.share
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_ENTITLEMENTS: Entitlements/HermesExtension.entitlements
        APPLICATION_EXTENSION_API_ONLY: true
    info:
      path: HermesShare/Info.plist
      properties:
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleDisplayName: Hermes Agent
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsText: true
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsImageWithMaxCount: 4
  HermesMobileTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: HermesMobileTests
        excludes:
          - LegacyWorkImportTests.swift
          - WorkRepositoryCrossProcessTests.swift
          - WorkRepositoryLeaseTests.swift
          - WorkRepositoryMigrationTests.swift
          - WorkRepositoryTestSupport.swift
      - path: ../../tests/fixtures/session_status_responses.json
        buildPhase: resources
    dependencies:
      - target: HermesMobile
      # GRDB direct link so CacheLayerTests can call DatabaseQueue(configuration:)
      # directly for in-memory test setups.
      - package: GRDB
        product: GRDB
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.hermes.app.tests
        GENERATE_INFOPLIST_FILE: true
  KilledAppInboxReconciliationValidation:
    type: bundle.unit-test
    platform: iOS
    sources:
      - KilledAppInboxReconciliationValidation
    dependencies:
      - target: HermesMobile
      - package: GRDB
        product: GRDB
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.hermes.app.killed-inbox-validation
        GENERATE_INFOPLIST_FILE: true
  WorkRepositoryTests:
    type: bundle.unit-test
    platform: iOS
    hostApplication: HermesWorkTestHost
    sources:
      - HermesMobileTests/LegacyWorkImportTests.swift
      - HermesMobileTests/WorkRepositoryCrossProcessTests.swift
      - HermesMobileTests/WorkRepositoryLeaseTests.swift
      - HermesMobileTests/WorkRepositoryMigrationTests.swift
      - HermesMobileTests/WorkRepositoryTestSupport.swift
      - HermesMobile/Support/SharedStore.swift
      - HermesMobile/Work
    dependencies:
      - target: HermesWorkTestHost
      - package: GRDB
        product: GRDB
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.hermes.app.work.tests
        GENERATE_INFOPLIST_FILE: true
  WorkRepositoryMacTests:
    # Tool-hosted mirror for CI/hosts where CoreSimulator is unavailable. It
    # compiles the exact same repository sources and test cases as the iOS target.
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - HermesMobileTests/LegacyWorkImportTests.swift
      - HermesMobileTests/WorkRepositoryCrossProcessTests.swift
      - HermesMobileTests/WorkRepositoryLeaseTests.swift
      - HermesMobileTests/WorkRepositoryMigrationTests.swift
      - HermesMobileTests/WorkRepositoryTestSupport.swift
      - HermesMobileTests/OutboxProcessorTests.swift
      - HermesMobileTests/OutboxCrashBoundaryTests.swift
      - HermesMobile/Support/SharedStore.swift
      - HermesMobile/Work
      - HermesMobile/Models/JSONValue.swift
      - HermesMobile/Stores/OutboxProcessor.swift
      - HermesMobile/Support/ReliabilityDiagnostics.swift
    dependencies:
      - package: GRDB
        product: GRDB
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.hermes.app.work.mac-tests
        GENERATE_INFOPLIST_FILE: true
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: OUTBOX_STANDALONE_TESTS
  HermesShareTests:
    type: bundle.unit-test
    platform: iOS
    hostApplication: HermesWorkTestHost
    sources:
      - HermesShareTests
      - HermesShare/SharedInboxWriter.swift
      - HermesShare/SharedItemLoader.swift
      - HermesMobile/Support/SharedStore.swift
      - HermesMobile/Work
    dependencies:
      - target: HermesWorkTestHost
      - package: GRDB
        product: GRDB
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.hermes.app.share.tests
        GENERATE_INFOPLIST_FILE: true
  HermesMobileUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - HermesMobileUITests
    dependencies:
      - target: HermesMobile
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.hermes.app.uitests
        GENERATE_INFOPLIST_FILE: true
schemes:
  HermesMobile:
    build:
      targets:
        HermesMobile: all
        HermesMobileTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - HermesMobileTests
        - KilledAppInboxReconciliationValidation
        - WorkRepositoryTests
        - HermesShareTests
        - HermesMobileUITests
      # Live UI tests (ChatFlowUITests / CrossClientSyncUITests) read HERMES_URL /
      # HERMES_TOKEN from the UI-test-runner process environment and forward them
      # into the app's launchEnvironment. These are wired here so xcodebuild's
      # `TEST_RUNNER_HERMES_URL` / `TEST_RUNNER_HERMES_TOKEN` overrides land in the
      # runner env (the scheme env var is the macro-expanded sink for them); when
      # the overrides are absent the tests self-skip, keeping CI green offline.
      environmentVariables:
        - variable: HERMES_URL
          value: $(TEST_RUNNER_HERMES_URL)
          isEnabled: true
        - variable: HERMES_TOKEN
          value: $(TEST_RUNNER_HERMES_TOKEN)
          isEnabled: true
        - variable: HERMES_RELAY_URL
          value: $(TEST_RUNNER_HERMES_RELAY_URL)
          isEnabled: true
        - variable: HERMES_LIVE_FOLLOW_MARKER
          value: $(TEST_RUNNER_HERMES_LIVE_FOLLOW_MARKER)
          isEnabled: true
        - variable: HERMES_PAGINATION_TITLE
          value: $(TEST_RUNNER_HERMES_PAGINATION_TITLE)
          isEnabled: true
  WorkRepositoryTests:
    build:
      targets:
        HermesWorkTestHost: all
        WorkRepositoryTests: [test]
        HermesShareTests: [test]
    test:
      config: Debug
      targets:
        - WorkRepositoryTests
        - HermesShareTests
  WorkRepositoryMacTests:
    build:
      targets:
        WorkRepositoryMacTests: [test]
    test:
      config: Debug
      targets:
        - WorkRepositoryMacTests
