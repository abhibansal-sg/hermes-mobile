name: hermes-mobile
version: 1.0.0
description: >-
  Stock-hook adapter and REST edge for the HermesMobile iOS app: APNs push +
  Live Activities, durable prompt receipts, device pairing, sandboxed file
  browse, attachment upload, and mobile presentation guidance.
author: Hermes Mobile (ABH-88)
kind: standalone
provides_hooks:
  - pre_llm_call
  - post_llm_call
  - on_session_end
  - pre_tool_call
  - post_tool_call
  - api_request_error
  - pre_approval_request
  - post_approval_response
  - on_session_finalize
