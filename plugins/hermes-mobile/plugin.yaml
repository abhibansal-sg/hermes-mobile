name: hermes-mobile
version: 1.0.0
description: >-
  Thin stock-gateway adapter for HermesMobile: event fan-out, device pairing,
  APNs delivery fallback, durable prompt receipts, file browse, and attachment
  upload. Enable with `hermes plugins enable hermes-mobile`; the co-located
  relay activates event fan-out automatically while connected.
author: Hermes Mobile (ABH-88)
kind: standalone
provides_hooks: []
