name: hermes-mobile
version: 2.0.0
description: >-
  HermesMobile edge integration plus the HRP/2 Mobile Agent Relay operator
  CLI. HRP/2 provides authenticated per-device encryption, durable streams,
  encrypted Push previews, pairing, and independent revocation without
  modifying the stock gateway. Enable the plugin, then run `hermes mobile
  enable --hub URL`.
