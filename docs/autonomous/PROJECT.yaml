# Hermes project manifest for autonomous development loops.
# This file is intentionally project-specific. The profile architecture is portable;
# these commands/module boundaries are not.

project:
  name: hermes-mobile
  permanent_root: /Users/abbhinnav/Developer/products/hermes-mobile
  worktree_root: /Users/abbhinnav/Developer/worktrees
  base_branch: environment-and-workflows-overview
  github_remote: origin
  github_repo: ab0991-oss/hermes-mobile
  linear_team_key: ABH
  profile_contracts: docs/autonomous/profile-contracts.md

planning:
  source_of_truth: linear
  execution_board: hermes-kanban
  linear_project: Hermes Mobile — Engineering
  linear_project_id: 020087b9-2942-458d-98fa-85649bd8edc3
  linear_project_url: https://linear.app/abhinav-bansal/project/hermes-mobile-engineering-3044581b07e4
  current_wave_label: wave:build-53
  wave_model: >-
    Build-wise waves live in Linear. Each wave defines the features and fixes
    intended for a specific build. Kanban is created only when a Linear issue is
    approved to start execution.
  workflow_states:
    backlog:
      name: Backlog
      type: backlog
      id: d9e0bb16-307e-41e9-9106-c652bc05e69d
    todo:
      name: Todo
      type: unstarted
      id: dbfa1e34-5319-40b8-adc3-472b92cbbdf8
    in_progress:
      name: In Progress
      type: started
      id: 9ac741b8-f77a-4776-8914-745e9abfc4c4
    in_review:
      name: In Review
      type: started
      id: 9a3d33dd-61d9-42c5-9245-4aea1efb82fa
    done:
      name: Done
      type: completed
      id: f74b6f75-1ce5-4714-b1ef-0c991dc6813f
    canceled:
      name: Canceled
      type: canceled
      id: c38edaa8-55d0-4aa9-8659-85a31c19a4f4

  taxonomy:
    wave_labels:
      active: wave:build-53
      pattern: wave:build-N
      rule: >-
        Every execution candidate must carry exactly one active wave label. Before
        changing the active wave, verify App Store Connect/TestFlight or the
        relevant release source so stale build labels are not reused.
    status_labels:
      approved_for_execution: status:approved-for-execution
    loop_labels:
      promoted_to_kanban: loop:promoted-to-kanban
      blocked_human: loop:blocked-human
      verified: loop:verified
    area_labels:
      - area:ios
      - area:server
      - area:desktop
      - area:infra
    lane_labels:
      - lane:claude
      - lane:glm
      - lane:codex
    type_labels:
      - type:feature
      - type:fix
      - type:polish
      - type:backfill

  active_execution_labels:
    - status:approved-for-execution
    - wave:build-53

  linear_issue_requirements:
    required_before_promotion:
      - canonical project: Hermes Mobile — Engineering
      - exactly one active wave label, currently wave:build-53
      - status:approved-for-execution label
      - at least one area label
      - at least one type label
      - clear user-facing acceptance criteria
      - concrete evidence requirements for verifier/reviewer
      - affected module/path or explicit discovery task
      - forbidden irreversible actions stated when relevant
    optional_routing_hints:
      - lane:claude for Claude Code / Anthropic engineer lane
      - lane:glm for OpenCode / GLM engineer lane
      - lane:codex for Codex fallback or OpenAI lane
    blocks_promotion_when_present:
      - loop:blocked-human

  issue_template:
    sections:
      - Goal
      - Acceptance Criteria
      - Evidence Required
      - Scope / Paths
      - Risks / Forbidden Actions
      - Suggested Lane / Profile
      - Kanban Handoff
    kanban_handoff_placeholder: >-
      Kanban: not promoted yet. When promoted, add board name, card id, child
      graph if decomposed, assigned profile(s), PR URL, and verification/review
      evidence links.

  kanban_promotion:
    rule: >-
      Promote a Linear issue/slice into Hermes Kanban only when work is actually
      starting. Promotion creates a Kanban Triage/unassigned gate first; child
      execution cards remain unassigned until Abhi or the orchestrator explicitly
      approves the graph and profile assignment.
    input_query: >-
      project = Hermes Mobile — Engineering AND label contains
      status:approved-for-execution AND label contains wave:build-53 AND state
      is not Done/Canceled AND label does not contain loop:blocked-human.
    initial_card:
      board: hermes-mobile
      status: triage
      assignee: null
      title_format: "{LINEAR_ID}: {Linear title}"
      required_body_fields:
        - Linear identifier and URL
        - Build wave label
        - Linear state and labels
        - Acceptance criteria
        - Affected module/area/path
        - Required evidence
        - Suggested lane/profile, if any
        - Next card on success/failure
        - Irreversible actions forbidden without Abhi approval
    decompose_step: >-
      Run `hermes kanban decompose <task_id>` manually while
      kanban.auto_decompose=false. Inspect the generated graph before assigning
      any child execution card.
    required_backlinks:
      - Linear issue identifier and URL on every Kanban card
      - Kanban card id/comment on the Linear issue
      - loop:promoted-to-kanban label after a card exists
      - PR URL/evidence posted back to Linear when available
    state_updates:
      on_promotion: In Progress
      on_pr_open_or_review_gate: In Review
      on_merge_and_verified: Done
      on_human_block: keep current state and add loop:blocked-human

  kanban_substrate:
    rule: >-
      Use Hermes' built-in Kanban triage/specify/decompose/dispatcher machinery
      as the execution substrate. Do not build a parallel custom dispatcher unless
      a missing built-in capability is explicitly identified and reviewed.
    live_config_policy:
      dispatch_in_gateway: true
      auto_decompose: false
      auto_decompose_per_tick: 1
      auto_promote_children: false
      orchestrator_profile: orchestrator
      default_assignee: architect
    rationale: >-
      Dashboard Triage cards are useful for raw ideas, but automatic
      decomposition is disabled while the fleet is on the trust ladder. Run
      `hermes kanban decompose <task_id>` manually after Linear/Abhi approval,
      inspect the generated graph, then assign execution cards deliberately.

runtime:
  production_hermes: /Users/abbhinnav/.hermes
  dev_gateway_home: /Users/abbhinnav/Developer/products/hermes-mobile/.hermes-dev
  dev_gateway_port: 9200
  dev_gateway_launchd_label: ai.hermes.dev-gateway
  note: >-
    Production Hermes owns Kanban/orchestration. The dev gateway is a test target
    for the iOS app and verifier smoke tests, not the loop controller.

modules:
  ios_app:
    paths:
      - apps/ios/
    default_engineer: iossonnet
    complex_engineer: engopus
    reviewer_required: true
    notes: >-
      Swift/iOS app work. Mechanical UI/state changes can go to Sonnet. Complex
      concurrency, persistence, auth, or cross-cutting session logic goes to Opus.

  hermes_mobile_plugin:
    paths:
      - plugins/hermes-mobile/
    default_engineer: pythonglm
    complex_engineer: engopus
    reviewer_required: true
    notes: >-
      Python plugin code for mobile pairing, APNs, devices, dashboard routes,
      broadcast fan-out, approvals, attachment upload, and transcript sync.

  dev_gateway:
    paths:
      - tui_gateway/
      - scripts/dev-gateway.sh
    default_engineer: engopus
    stock_core: true
    autonomous_edits: blocked
    notes: >-
      Live dev gateway path is sensitive. Autonomous agents may analyze and propose,
      but edits require explicit human approval because this can break the phone.

  hermes_cli_core:
    paths:
      - hermes_cli/
      - gateway/
      - hermes_state.py
      - run_agent.py
      - model_tools.py
    default_engineer: engopus
    stock_core: true
    autonomous_edits: blocked
    notes: >-
      Stock Hermes core. Prefer plugin/skill/config extensions. Autonomous edits
      require human approval and upstream-safety review.

  docs_and_governance:
    paths:
      - docs/
      - .hermes/
      - .claude/loops/
    default_engineer: pythonglm
    autonomous_edits: allowed
    notes: >-
      Design docs, project manifest, loop governance, and local-only operating docs.

commands:
  python_targeted_tests: scripts/run_tests.sh {path} -- -q
  hermes_cli_tests: scripts/run_tests.sh tests/hermes_cli -- -q
  changed_py_lint: ruff check {changed_files}
  py_compile: python3 -m py_compile {changed_py_files}
  ios_build: scripts/ios-build.sh
  git_status: git status --short --branch

verification:
  default_evidence:
    - git diff/stat
    - exact test command and exit code
    - changed files list
    - PR URL when opened
  ios_evidence:
    - ios build/test output
    - simulator screenshot when UI-visible
    - dev gateway health when connectivity-related
  dev_gateway_health:
    port: 9200
    expected_home: /Users/abbhinnav/Developer/products/hermes-mobile/.hermes-dev

external_coding_lanes:
  glm_opencode:
    profile: pythonglm
    model: zai-coding-plan/glm-5.2
    command_pattern: env -u SSL_CERT_FILE opencode run -m zai-coding-plan/glm-5.2 "$(cat PROMPT_FILE)"
    notes: >-
      Proven on ABH-185. Hermes environment sets SSL_CERT_FILE in a way that breaks
      GLM-5.2 streaming; always unset it for OpenCode.

  claude_code:
    profiles:
      - iossonnet
      - engopus
    status: needs_skill
    notes: >-
      Need a claude-code-coding-lane skill mirroring the GLM lane: worktree,
      prompt staging, process monitoring, diff/test collection, PR evidence.

  codex:
    profile: engcodex
    status: needs_skill
    notes: >-
      Fallback/alternate build lane, not the primary path.

human_gates:
  stock_kanban_policy: >-
    Keep the production Hermes gateway/Kanban implementation stock. Human gates
    start as unassigned cards. Do not use blocked+assignee as an initial human
    gate because stock recompute/dispatch may treat blocked cards without a
    sticky block event as promotable. Do not use triage as a parking state on a
    live board where auto-specifier or auto-decomposer is active; stock Hermes
    may specify/promote triage cards. Assign/promote only after approval.
  never_autonomous:
    - merge to base/shared branch
    - TestFlight upload or release
    - force-push or destructive git operations
    - pushing to upstream NousResearch
    - stock-core edits without explicit approval
    - device-only repro requiring Abhi's iPhone
    - direction forks not covered by the spec

labels:
  area:
    ios: area:ios
    server: area:server
  loop:
    shadow: loop:shadow
    verified: loop:verified
    approved: loop:approved
    blocked: blocked:needs-human
