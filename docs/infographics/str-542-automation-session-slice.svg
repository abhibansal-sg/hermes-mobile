<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="540" viewBox="0 0 1200 540" role="img" aria-labelledby="title desc">
  <title id="title">STR-542 automation session data flow</title>
  <desc id="desc">The automation slice fetches cron and subagent sessions independently, filters the response, then serves the drawer and Settings surfaces without changing human Recents.</desc>
  <rect width="1200" height="540" fill="#0b1020" rx="24"/>
  <text x="72" y="86" fill="#f8fafc" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="36" font-weight="700">Automation sessions: one live contract, isolated from Recents</text>
  <text x="72" y="124" fill="#a8b5cb" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="20">STR-542 · source=cron,subagent · include_children=true</text>
  <g font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">
    <rect x="72" y="206" width="218" height="154" rx="18" fill="#172554" stroke="#60a5fa" stroke-width="2"/>
    <text x="98" y="258" fill="#dbeafe" font-size="25" font-weight="700">REST request</text>
    <text x="98" y="294" fill="#bfdbfe" font-size="18">sessionsWithTotal</text>
    <text x="98" y="324" fill="#93c5fd" font-size="17">cron + subagent</text>
    <path d="M312 282h100" stroke="#60a5fa" stroke-width="5" stroke-linecap="round"/>
    <path d="M400 269l24 13-24 13z" fill="#60a5fa"/>
    <rect x="438" y="206" width="270" height="154" rx="18" fill="#14332d" stroke="#34d399" stroke-width="2"/>
    <text x="464" y="258" fill="#d1fae5" font-size="25" font-weight="700">SessionStore slice</text>
    <text x="464" y="294" fill="#a7f3d0" font-size="18">defense filter at ingress</text>
    <text x="464" y="324" fill="#6ee7b7" font-size="17">automationSessions only</text>
    <path d="M730 282h94" stroke="#34d399" stroke-width="5" stroke-linecap="round"/>
    <path d="M812 269l24 13-24 13z" fill="#34d399"/>
    <rect x="850" y="174" width="278" height="92" rx="18" fill="#3b1e56" stroke="#c084fc" stroke-width="2"/>
    <text x="876" y="229" fill="#f3e8ff" font-size="23" font-weight="700">Drawer preview</text>
    <rect x="850" y="300" width="278" height="92" rx="18" fill="#3b1e56" stroke="#c084fc" stroke-width="2"/>
    <text x="876" y="356" fill="#f3e8ff" font-size="23" font-weight="700">Settings → Cron</text>
    <path d="M708 282c72 0 74-62 126-62" fill="none" stroke="#c084fc" stroke-width="4"/>
    <path d="M708 282c72 0 74 64 126 64" fill="none" stroke="#c084fc" stroke-width="4"/>
    <rect x="72" y="424" width="1056" height="58" rx="14" fill="#172033"/>
    <text x="98" y="461" fill="#fbbf24" font-size="20" font-weight="700">Invariant:</text>
    <text x="205" y="461" fill="#d7e0ef" font-size="20">human Recents still requests exclude_sources=cron,subagent and never stores automation rows.</text>
  </g>
</svg>
